<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ტესტირების პლატფორმა</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div class="container">
        <h1 class="main-title">სათაური</h1>

        <div id="auth-screen" class="box">
            <h2>ავტორიზაცია</h2>
            <p class="subtitle">შედით თქვენს კაბინეტში</p>
            <form id="auth-form">
                <input type="email" id="email" placeholder="ელ-ფოსტა" required>
                <input type="password" id="password" placeholder="პაროლი" required>
                <button type="submit" id="auth-btn">შესვლა / რეგისტრაცია</button>
            </form>
            <p id="auth-error" class="error"></p>
        </div>

        <div id="dashboard-screen" class="box hidden">
            <div class="header">
                <h3>მოგესალმებით, <span id="user-email-display"></span></h3>
                <button id="logout-btn">გამოსვლა</button>
            </div>
            
            <hr>

            <div class="status-panel">
                <h4>თქვენი სტატუსი:</h4>
                <p>შესრულებული დავალებები: <span id="completed-status" class="badge">0</span></p>
                <p>მიმდინარე ეტაპი: <span id="current-stage-status">არ არის დაწყებული</span></p>
            </div>

            <div id="task-zone">
                <div id="stage-1" class="stage">
                    <div class="test-item">ტესტი 1</div>
                    <div class="test-item">ტესტ 70</div>
                    <div class="test-item">ტესტი 20</div>
                    <button class="action-btn" id="start-btn-1" onclick="showInputBlock(1)">დაწყება</button>
                    
                    <div id="input-block-1" class="input-block hidden">
                        <input type="text" id="user-text-1" placeholder="ჩაწერეთ რაიმე...">
                        <button class="action-btn start1-btn" onclick="startTimer(1, 5)">დაწყება1</button>
                    </div>
                </div>

                <div id="stage-2" class="stage hidden">
                    <button class="action-btn next-btn" id="next-trigger-2" onclick="showStage2Tasks()">ტესტი 2</button>
                    <div id="stage-2-tasks" class="hidden">
                        <div class="test-item">ტესტი 70</div>
                        <div class="test-item">ტესტი 50</div>
                        <button class="action-btn" id="start-btn-2" onclick="showInputBlock(2)">დაწყება</button>
                        
                        <div id="input-block-2" class="input-block hidden">
                            <input type="text" id="user-text-2" placeholder="ჩაწერეთ რაიმე...">
                            <button class="action-btn start1-btn" onclick="startTimer(2, 5)">დაწყება1</button>
                        </div>
                    </div>
                </div>

                <div id="stage-3" class="stage hidden">
                    <button class="action-btn next-btn" id="next-trigger-3" onclick="showStage3Tasks()">შემდეგი</button>
                    <div id="stage-3-tasks" class="hidden">
                        <div class="test-item">ტესტი 3</div>
                        <div class="test-item">ტესტი 70</div>
                        <div class="test-item">ტესტი 100</div>
                        <button class="action-btn" id="start-btn-3" onclick="showInputBlock(3)">დაწყება</button>
                        
                        <div id="input-block-3" class="input-block hidden">
                            <input type="text" id="user-text-3" placeholder="ჩაწერეთ რაიმე...">
                            <button class="action-btn start1-btn" onclick="startTimer(3, 5)">დაწყება1</button>
                        </div>
                    </div>
                </div>

                <div id="timer-box" class="hidden">
                    <div class="spinner"></div>
                    <p>დავალება სრულდება... <span id="countdown">5</span> წმ</p>
                </div>

                <div id="final-message" class="hidden">
                    <div class="success-icon">✓</div>
                    <h3>ყველა დავალება შესრულებულია!</h3>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
